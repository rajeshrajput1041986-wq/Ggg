<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ateex Cloud - Minecraft Server Hosting</title>
<style>
body {
margin: 0;
font-family: Arial, sans-serif;
background-color: #f5f5f5;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
min-height: 100vh;
padding: 20px;
}

.minecraft-hosting-pill {
background-color: #3b82f6;
color: white;
padding: 8px 16px;
border-radius: 9999px;
font-size: 14px;
font-weight: 600;
cursor: pointer;
transition: background-color 0.2s;
display: flex;
align-items: center;
}

.minecraft-hosting-pill:hover {
background-color: #2563eb;
}

.minecraft-hosting-pill svg {
margin-right: 8px;
fill: currentColor;
width: 16px;
height: 16px;
}

h1 {
font-size: 3rem;
font-weight: 700;
margin: 20px 0;
color: #1f2937;
text-align: center;
}

.hosting-options {
display: grid;
grid-template-columns: repeat(2, 1fr);
grid-gap: 16px;
max-width: 600px;
width: 100%;
}

.hosting-option {
background-color: white;
border: 1px solid #e5e7eb;
padding: 24px;
border-radius: 12px;
cursor: pointer;
transition: transform 0.2s, box-shadow 0.2s;
text-align: center;
}

.hosting-option:hover {
transform: translateY(-2px);
box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
border-color: #d1d5db;
}

.hosting-option h2 {
font-size: 1.25rem;
margin-top: 0;
margin-bottom: 8px;
color: #374151;
}

.hosting-option p {
font-size: 0.875rem;
color: #6b7280;
margin-bottom: 0;
}
</style>
</head>

</div>
<div class="hosting-option">
